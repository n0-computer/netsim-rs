images:
  - location: "https://cloud.debian.org/images/cloud/trixie/latest/debian-trixie-genericcloud-amd64.qcow2"
    arch: "x86_64"

mounts:
  - location: "."
    writable: true
    mountPoint: "/app"

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      sudo modprobe sch_netem
      echo sch_netem | sudo tee -a /etc/modules
      export DEBIAN_FRONTEND=noninteractive
      apt update
      apt install -y bridge-utils iproute2 iputils-ping iptables nftables net-tools curl iperf3

