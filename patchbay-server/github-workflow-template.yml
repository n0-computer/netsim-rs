# Patchbay Tests — GitHub Actions workflow template
#
# Prerequisites:
#   1. Set repository secrets PATCHBAY_URL and PATCHBAY_API_KEY
#   2. Adjust the "Run tests" step to match your test command
#   3. If your tests need a self-hosted runner, update runs-on accordingly
#
# For server setup see: https://github.com/n0-computer/patchbay/tree/main/patchbay-server

name: Patchbay Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: patchbay-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patchbay_tests:
    name: Patchbay Tests
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── Build tools — adjust to your project ──
      - uses: dtolnay/rust-toolchain@stable

      # ── Install patchbay CLI ──
      # Try cargo-binstall first (fast, downloads pre-built binary),
      # fall back to cargo install (builds from source).
      - name: Install patchbay CLI
        run: |
          cargo binstall patchbay-cli --no-confirm 2>/dev/null \
            || cargo install patchbay-cli --git https://github.com/n0-computer/patchbay

      # ── Run tests — replace with your own command ──
      # Use `patchbay test` which writes structured output to .patchbay/work/.
      # --persist keeps the run directory after tests complete.
      - name: Run tests
        id: tests
        run: patchbay test --persist -p my-crate --test my-test
        env:
          RUST_LOG: ${{ runner.debug && 'TRACE' || 'DEBUG' }}

      # ── Upload results to patchbay-serve ──
      - name: Upload results
        if: always()
        env:
          PATCHBAY_URL: ${{ secrets.PATCHBAY_URL }}
          PATCHBAY_API_KEY: ${{ secrets.PATCHBAY_API_KEY }}
        run: |
          set -euo pipefail
          PROJECT="${{ github.event.repository.name }}"

          # Find the most recent run directory
          RUN_DIR=$(ls -dt .patchbay/work/run-* 2>/dev/null | head -1)
          if [ -z "$RUN_DIR" ]; then
            echo "No run directory found, skipping upload"
            exit 0
          fi

          patchbay upload "$RUN_DIR" \
            --project "$PROJECT" \
            --url "$PATCHBAY_URL" \
            --api-key "$PATCHBAY_API_KEY"

      # ── Post or update PR comment ──
      - name: Comment on PR
        if: always() && github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- patchbay-results -->';
            const status = '${{ steps.tests.outcome }}';
            const icon = status === 'success' ? '✅' : '❌';
            const sha = '${{ github.sha }}';
            const shortSha = sha.slice(0, 7);
            const commitUrl = `${{ github.server_url }}/${{ github.repository }}/commit/${sha}`;
            const date = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const url = '${{ secrets.PATCHBAY_URL }}';
            const project = '${{ github.event.repository.name }}';
            const body = [
              marker,
              `${icon} **patchbay:** ${status} | ${url}/runs?project=${project}`,
              `<sub>${date} · [\`${shortSha}\`](${commitUrl})</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const params = { owner: context.repo.owner, repo: context.repo.repo };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number, body });
            }
