# Patchbay Tests — GitHub Actions workflow template
#
# Prerequisites:
#   1. Set repository secrets PATCHBAY_URL and PATCHBAY_API_KEY
#   2. Adjust the "Run tests" step to match your test command
#   3. If your tests need a self-hosted runner, update runs-on accordingly
#
# For server setup see: https://github.com/n0-computer/patchbay/tree/main/patchbay-server
#
# No patchbay binary required in CI — just nextest + curl.

name: Patchbay Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: patchbay-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patchbay_tests:
    name: Patchbay Tests
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── Build tools — adjust to your project ──
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      # ── Run tests with nextest JSON output ──
      - name: Run tests
        id: tests
        run: |
          NEXTEST_EXPERIMENTAL_LIBTEST_JSON=1 \
          cargo nextest run \
            --message-format libtest-json \
            -p my-crate --test my-test \
            > .patchbay-results.jsonl
        env:
          RUST_LOG: ${{ runner.debug && 'TRACE' || 'DEBUG' }}
          PATCHBAY_OUTDIR: ${{ github.workspace }}/.patchbay-testdir

      # ── Upload results to patchbay-serve ──
      # The server parses nextest JSONL and creates run.json automatically.
      - name: Upload results
        id: upload
        if: always()
        env:
          PATCHBAY_URL: ${{ secrets.PATCHBAY_URL }}
          PATCHBAY_API_KEY: ${{ secrets.PATCHBAY_API_KEY }}
        run: |
          set -euo pipefail
          PROJECT="${{ github.event.repository.name }}"

          # Collect output into a directory for upload
          UPLOAD_DIR=$(mktemp -d)
          # Include nextest results
          cp .patchbay-results.jsonl "$UPLOAD_DIR/test-results.jsonl" 2>/dev/null || true
          # Include test output (testdir, metrics, events) if present
          if [ -d ".patchbay-testdir" ]; then
            cp -rL .patchbay-testdir/* "$UPLOAD_DIR/" 2>/dev/null || true
          fi

          # Upload as tar.gz
          BODY=$(tar czf - -C "$UPLOAD_DIR" . | curl -sS -X POST \
            -H "Authorization: Bearer $PATCHBAY_API_KEY" \
            -H "Content-Type: application/gzip" \
            --data-binary @- \
            "$PATCHBAY_URL/api/push/$PROJECT")

          VIEW_URL=$(echo "$BODY" | jq -r '.view_url // empty')
          echo "view_url=$VIEW_URL" >> "$GITHUB_OUTPUT"
          rm -rf "$UPLOAD_DIR"

      # ── Post or update PR comment ──
      - name: Comment on PR
        if: always() && github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- patchbay-results -->';
            const status = '${{ steps.tests.outcome }}';
            const icon = status === 'success' ? '✅' : '❌';
            const sha = '${{ github.sha }}';
            const shortSha = sha.slice(0, 7);
            const commitUrl = `${{ github.server_url }}/${{ github.repository }}/commit/${sha}`;
            const date = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const viewUrl = '${{ steps.upload.outputs.view_url }}';
            const viewLine = viewUrl ? ` | [view results](${viewUrl})` : '';
            const body = [
              marker,
              `${icon} **patchbay:** ${status}${viewLine}`,
              `<sub>${date} · [\`${shortSha}\`](${commitUrl})</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const params = { owner: context.repo.owner, repo: context.repo.repo };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number, body });
            }
