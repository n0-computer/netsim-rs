# Patchbay Tests — GitHub Actions workflow template
#
# Prerequisites:
#   1. Set repository secrets PATCHBAY_URL and PATCHBAY_API_KEY
#   2. Adjust the "Run tests" step to match your test command
#   3. If your tests need a self-hosted runner, update runs-on accordingly
#
# For server setup see: https://github.com/n0-computer/patchbay/tree/main/patchbay-server

name: Patchbay Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: patchbay-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patchbay_tests:
    name: Patchbay Tests
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── Build tools — adjust to your project ──
      - uses: dtolnay/rust-toolchain@stable

      # ── Run tests — replace with your own command ──
      - name: Run tests
        id: tests
        run: cargo test --release -p my-crate --test patchbay -- --test-threads=1
        env:
          RUST_LOG: ${{ runner.debug && 'TRACE' || 'DEBUG' }}

      # ── Push results to patchbay-serve ──
      - name: Push results
        if: always()
        env:
          PATCHBAY_URL: ${{ secrets.PATCHBAY_URL }}
          PATCHBAY_API_KEY: ${{ secrets.PATCHBAY_API_KEY }}
          TEST_STATUS: ${{ steps.tests.outcome }}
        run: |
          set -euo pipefail
          PROJECT="${{ github.event.repository.name }}"
          TESTDIR="$(cargo metadata --format-version=1 --no-deps | jq -r .target_directory)/testdir-current"
          [ ! -d "$TESTDIR" ] && echo "No testdir output, skipping" && exit 0

          cat > "$TESTDIR/run.json" <<MANIFEST
          {
            "project": "$PROJECT",
            "branch": "${{ github.head_ref || github.ref_name }}",
            "commit": "${{ github.sha }}",
            "pr": ${{ github.event.pull_request.number || 'null' }},
            "pr_url": "${{ github.event.pull_request.html_url || '' }}",
            "title": "${{ github.event.pull_request.title || github.event.head_commit.message || '' }}",
            "test_outcome": "$TEST_STATUS",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          MANIFEST

          RESPONSE=$(tar -czf - -C "$TESTDIR" . | \
            curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $PATCHBAY_API_KEY" \
              -H "Content-Type: application/gzip" \
              --data-binary @- "$PATCHBAY_URL/api/push/$PROJECT")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          [ "$HTTP_CODE" != "200" ] && echo "Push failed ($HTTP_CODE): $BODY" && exit 1

          GROUP=$(echo "$BODY" | jq -r .group)
          echo "PATCHBAY_VIEW_URL=$PATCHBAY_URL/batch/$GROUP" >> "$GITHUB_ENV"
          echo "PATCHBAY_TEST_STATUS=$TEST_STATUS" >> "$GITHUB_ENV"
          echo "Results: $PATCHBAY_URL/batch/$GROUP"

      # ── Post or update PR comment ──
      - name: Comment on PR
        if: always() && env.PATCHBAY_VIEW_URL
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = context.issue?.number;
            if (!prNumber) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner, repo: context.repo.repo,
                head: `${context.repo.owner}:${{ github.ref_name }}`,
                state: 'open',
              });
              if (!prs.length) return;
              prNumber = prs[0].number;
            }

            const status = process.env.PATCHBAY_TEST_STATUS;
            const icon = status === 'success' ? '✅' : '❌';
            const sha = '${{ github.sha }}';
            const shortSha = sha.slice(0, 7);
            const commitUrl = `${{ github.server_url }}/${{ github.repository }}/commit/${sha}`;
            const date = new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
            const marker = '<!-- patchbay-results -->';
            const body = [
              marker,
              `${icon} **patchbay:** ${status} | ${process.env.PATCHBAY_VIEW_URL}`,
              `<sub>${date} · [\`${shortSha}\`](${commitUrl})</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const params = { owner: context.repo.owner, repo: context.repo.repo };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: prNumber, body });
            }
