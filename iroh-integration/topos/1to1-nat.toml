[[router]]
name = "dc"

[[router]]
name = "isp"
nat  = "cgnat"

[[router]]
name     = "lan-provider"
upstream = "isp"
nat      = "destination-independent"

[[router]]
name     = "lan-fetcher"
upstream = "isp"
nat      = "destination-dependent"

[device.relay.eth0]
gateway = "dc"

[device.provider.eth0]
gateway = "lan-provider"

[device.fetcher.eth0]
gateway = "lan-fetcher"
