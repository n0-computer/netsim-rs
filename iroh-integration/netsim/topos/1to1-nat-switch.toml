[[router]]
name = "dc"

[[router]]
name     = "lan-provider"
nat      = "home"

[[router]]
name     = "lan-fetcher"
nat      = "home"

[[router]]
name     = "lan-fetcher2"
nat      = "home"

[device.relay.eth0]
gateway = "dc"

[device.provider.eth0]
gateway = "lan-provider"

[device.fetcher.eth0]
gateway = "lan-fetcher"

[device.fetcher.eth1]
gateway = "lan-fetcher2"
