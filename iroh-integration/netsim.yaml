name: netsim-rs

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
      netsim_branch:
        required: true
        type: string
        default: "main"
      build_profile:
        required: false
        type: string
        default: "release"
      sim_paths:
        required: false
        type: string
        default: "iroh-integration/sims"
      rust_log:
        required: false
        type: string
        default: ""

env:
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  netsim:
    name: Netsim
    timeout-minutes: 45
    runs-on: [self-hosted, linux, X64]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.branch }}
        submodules: recursive

    - name: Install rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y iproute2 iptables nftables iputils-ping

    - name: Build iroh
      run: |
        if [ -n "${RUST_TARGET:-}" ]; then
          cargo build --profile ${{ inputs.build_profile }} --target "${RUST_TARGET}" --workspace --all-features --examples --bins
        else
          cargo build --profile ${{ inputs.build_profile }} --workspace --all-features --examples --bins
        fi

    - name: Fetch netsim-rs
      run: |
        cd ..
        rm -rf netsim-rs
        git clone --depth 1 --single-branch --branch ${{ inputs.netsim_branch }} https://github.com/n0-computer/netsim-rs.git

    - name: Build netsim-rs
      run: |
        cd ../netsim-rs
        if [ -n "${RUST_TARGET:-}" ]; then
          cargo build --release --target "${RUST_TARGET}"
        else
          cargo build --release
        fi

    - name: Align binary paths
      run: |
        if [ -n "${RUST_TARGET:-}" ]; then
          bin_dir="target/${RUST_TARGET}/${{ inputs.build_profile }}"
        else
          bin_dir="target/${{ inputs.build_profile }}"
        fi
        if [ "${{ inputs.build_profile }}" != "release" ] || [ -n "${RUST_TARGET:-}" ]; then
          mkdir -p target/release/examples
          cp -f "${bin_dir}/examples/transfer" target/release/examples/transfer
          cp -f "${bin_dir}/iroh-relay" target/release/iroh-relay
        fi

    - name: Run sims
      id: run_sims
      run: |
        set -euo pipefail
        if [ -n "${RUST_TARGET:-}" ]; then
          netsim_bin="../netsim-rs/target/${RUST_TARGET}/release/netsim"
        else
          netsim_bin="../netsim-rs/target/release/netsim"
        fi
        mkdir -p iroh-integration/work
        IFS=',' read -ra sim_paths <<< "${{ inputs.sim_paths }}"
        rust_log="${{ inputs.rust_log }}"
        declare -a sim_args=()
        for sim_path in "${sim_paths[@]}"; do
          sim_path="$(echo "${sim_path}" | xargs)"
          [ -z "${sim_path}" ] && continue
          sim_args+=("${sim_path}")
        done
        if [ "${#sim_args[@]}" -eq 0 ]; then
          echo "No sim paths provided" >&2
          exit 1
        fi
        if [ -n "${rust_log}" ]; then
          sudo -E RUST_LOG="${rust_log}" "${netsim_bin}" "${sim_args[@]}" --work-dir "iroh-integration/work"
        else
          sudo -E "${netsim_bin}" "${sim_args[@]}" --work-dir "iroh-integration/work"
        fi

    - name: Publish combined summary
      if: always()
      run: |
        if [ -f iroh-integration/work/combined-results.md ]; then
          cat iroh-integration/work/combined-results.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Collect results
      if: always()
      run: |
        tar -cvzf netsim-report.tar.gz iroh-integration/work || true

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: netsim-results
        path: netsim-report.tar.gz
        retention-days: 3
        overwrite: true
